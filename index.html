<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>腹直肌鞘 · 弓状线上下层次</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;overflow:hidden;color:#eee}
#c{width:100vw;height:100vh;display:block}
#panel{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:5px;align-items:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);padding:8px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);max-width:96vw;z-index:100}
#cmd{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
#cmd button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);color:#eee;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:12px;white-space:nowrap;touch-action:manipulation;min-height:36px;-webkit-tap-highlight-color:transparent}
#cmd button:active{background:rgba(255,255,255,0.18);transform:scale(0.95)}
#cmd button.p{background:#2d6a4f;border-color:#40916c}
#ir{display:flex;gap:5px;width:100%}
#ir input{flex:1;padding:8px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);color:#eee;font-size:16px;outline:none}
#ir input:focus{border-color:#4a9eff}
#ir button{padding:8px 14px;border-radius:9px;border:none;background:#4a9eff;color:#fff;font-size:13px;touch-action:manipulation;min-height:36px}
#s{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);font-size:12px;z-index:100;text-align:center;max-width:90vw;line-height:1.4;pointer-events:none}
#s .h{color:#888;font-size:11px;margin-top:2px;display:block}
#lg{position:fixed;left:8px;top:60px;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);font-size:11px;line-height:1.6;min-width:130px;display:none}
#lg.show{display:block}
#lg .i{display:flex;align-items:center;gap:6px;margin:2px 0}
#lg .c{width:16px;height:12px;border-radius:2px;flex-shrink:0}
#lt{position:fixed;left:8px;top:60px;z-index:100;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.06);color:#eee;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px}
@media(max-width:768px){#panel{padding:6px 8px;gap:3px}#cmd button{font-size:11px;padding:5px 8px;min-height:32px}#s{font-size:11px;top:6px;padding:4px 12px}#lg{left:4px;top:50px;padding:6px;font-size:10px}}
</style>
</head>
<body>
<div id="s"><span id="st">腹直肌鞘 · 弓状线 · 一体模型</span><span class="h" id="sh">鼠标拖拽旋转 · 滚轮缩放</span></div>
<button id="lt" onclick="document.getElementById('lg').classList.toggle('show')">📖</button>
<div id="lg">
  <div class="i"><span class="c" style="background:#b0b0b0"></span> 腹外斜肌腱膜</div>
  <div class="i"><span class="c" style="background:#d4a373"></span> 腹内斜肌腱膜(前/后层同色)</div>
  <div class="i"><span class="c" style="background:#7a7a7a"></span> 腹横肌腱膜</div>
  <div class="i"><span class="c" style="background:#e8845a"></span> 腹直肌</div>
  <div class="i"><span class="c" style="background:#95a5a6;opacity:0.5"></span> 腹横筋膜</div>
</div>
<div id="panel">
  <div id="cmd">
    <button onclick="rst()">🔄复位</button>
    <button onclick="as()" class="p">▶滑动截面</button>
    <button onclick="tl()">🏷标注</button>
  </div>
  <div id="ir">
    <input id="ti" placeholder="输入: 滑动截面/前层/后层/讲解/临床" />
    <button onclick="hc(document.getElementById('ti').value)">发送</button>
  </div>
</div>
<div id="c"></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from 'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

const ct=document.getElementById('c'),sc=new THREE.Scene();sc.background=new THREE.Color(0x0f0f1a);
const cam=new THREE.PerspectiveCamera(28,ct.clientWidth/ct.clientHeight,0.1,100);
cam.position.set(10,4,11);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(ct.clientWidth,ct.clientHeight);r.setPixelRatio(Math.min(window.devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.0;
ct.appendChild(r.domElement);
const lr=new CSS2DRenderer();lr.setSize(ct.clientWidth,ct.clientHeight);
lr.domElement.style.position='absolute';lr.domElement.style.top='0';lr.domElement.style.left='0';
lr.domElement.style.pointerEvents='none';ct.appendChild(lr.domElement);
const or=new OrbitControls(cam,r.domElement);
or.target.set(0,0,0);or.enableDamping=true;or.dampingFactor=0.08;or.minDistance=4;or.maxDistance=25;or.update();

sc.add(new THREE.AmbientLight(0x404060,0.5));
const kl=new THREE.DirectionalLight(0xffffff,2.5);kl.position.set(8,10,6);kl.castShadow=true;sc.add(kl);
sc.add(new THREE.DirectionalLight(0x88bbff,0.6).position.set(-5,6,-6));
sc.add(new THREE.DirectionalLight(0xffffff,0.5).position.set(-4,3,8));
sc.add(new THREE.HemisphereLight(0x4466aa,0x222244,0.4));

// ═══════════════════════════════════════
//  UNIFIED VERTICAL MODEL
//  Y+ (top) = above arcuate line
//  Y- (bottom) = below arcuate line
//  Z+ (front) = superficial (skin side)
//  Z- (back) = deep (peritoneal side)
// ═══════════════════════════════════════
const mg=new THREE.Group();sc.add(mg);

const HW=2.8, // half-width (left-right)
      D=2.2,  // half-depth (front-back)
      HH=2.8,  // half-height of each section (total height = 5.6)
      LT=0.22; // layer thickness

const C={eo:0xb0b0b0, io:0xd4a373, ta:0x7a7a7a, ra:0xe8845a, fascia:0x95a5a6};

function mkBox(clr,w,h,d,x,y,z,op=1){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.MeshPhysicalMaterial({
    color:clr,roughness:0.5,metalness:0.0,
    transparent:op<1,opacity:op,clearcoat:0.05
  });
  const me=new THREE.Mesh(g,m);me.position.set(x,y,z);
  me.castShadow=true;return me;
}

// ─── SINGLE continuous rectus abdominis ───
// Rectus: rotated 90° along its long axis → broad (left-right) and thin (front-back)
// width = HW*0.6 (broad), depth = 0.4 (thin strip)
mg.add(mkBox(C.ra, HW*0.6, HH*2, 0.4, 0, 0, 0));

// ─── Upper: Above Arcuate Line ───
// Front→back: EO → IO_ant → RECTUS → IO_post → TA → fascia
const uy = HH/2; // center of upper half

mg.add(mkBox(C.eo, HW, HH, LT, 0, uy, D-LT/2));
mg.add(mkBox(C.io, HW, HH, LT, 0, uy, D-LT*1.5-0.02));
// rectus is here (center) - broad flat muscle spanning left-right
mg.add(mkBox(C.io, HW, HH, LT, 0, uy, -D+LT*2.5+0.04)); // IO posterior, SAME color
mg.add(mkBox(C.ta, HW, HH, LT, 0, uy, -D+LT*1.5+0.02));
mg.add(mkBox(C.fascia, HW, HH, LT*0.3, 0, uy, -D+LT*0.3, 0.3));

// ─── Lower: Below Arcuate Line ───
// Front→back: EO → IO_ant → IO_post → TA → RECTUS → fascia
const ly = -HH/2;

mg.add(mkBox(C.eo, HW, HH, LT, 0, ly, D-LT/2));
mg.add(mkBox(C.io, HW, HH, LT, 0, ly, D-LT*1.5-0.02));  // IO anterior
mg.add(mkBox(C.io, HW, HH, LT, 0, ly, D-LT*2.5-0.04));  // IO posterior - BOTH on same side!
mg.add(mkBox(C.ta, HW, HH, LT, 0, ly, D-LT*3.5-0.06));
// rectus is here (center) - same single continuous muscle
mg.add(mkBox(C.fascia, HW, HH, LT*0.3, 0, ly, -D+LT*0.15, 0.3));

// ─── Arcuate Line (horizontal red line at y=0) ───
const arcPts=[
  new THREE.Vector3(-HW-0.1,0,-D-0.05),
  new THREE.Vector3(HW+0.1,0,-D-0.05),
];
mg.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(arcPts),
  new THREE.LineBasicMaterial({color:0xe74c3c})
));

// Arrow markers
for(let side=-1;side<=1;side+=2){
  const arr=new THREE.Mesh(
    new THREE.ConeGeometry(0.06,0.18,8),
    new THREE.MeshBasicMaterial({color:0xe74c3c})
  );
  arr.position.set(side*(HW+0.3),0,-D-0.05);
  const dir=side>0?-Math.PI/2:Math.PI/2;
  arr.rotation.z=dir;
  mg.add(arr);
}

// ─── Helper: label with leader line ───
function lblWithLine(text, labelX, labelY, labelZ, targetX, targetY, targetZ, color='#fff', s='12px'){
  // Label
  const d=document.createElement('div');d.textContent=text;
  d.style.color=color;d.style.fontSize=s;d.style.fontWeight='500';
  d.style.textShadow='0 1px 4px rgba(0,0,0,0.9)';
  d.style.background='rgba(0,0,0,0.7)';d.style.padding='2px 10px';
  d.style.borderRadius='5px';d.style.border='1px solid '+color;
  d.style.whiteSpace='nowrap';d.style.pointerEvents='none';
  const lbl=new CSS2DObject(d);
  lbl.position.set(labelX, labelY, labelZ);
  mg.add(lbl);

  // Leader line
  const linePts=[
    new THREE.Vector3(targetX, targetY, targetZ),
    new THREE.Vector3(labelX, labelY, labelZ),
  ];
  const line=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(linePts),
    new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.35})
  );
  mg.add(line);

  return lbl;
}

const LGs=[];

// --- Left side labels (above arcuate) ---
const lxL = -HW-1.1;
const lxR = HW+1.1;

LGs.push(lblWithLine('弓状线以上', lxL, HH*0.65, D*0.6, 0, HH*0.65, D*0.3, '#ff6b6b', '13px'));
LGs.push(lblWithLine('弓状线以下', lxL, -HH*0.65, D*0.6, 0, -HH*0.65, D*0.3, '#ff6b6b', '13px'));
LGs.push(lblWithLine('弓状线', lxL, 0, -D-0.5, 0, 0, -D-0.05, '#e74c3c', '12px'));

LGs.push(lblWithLine('腹外斜肌腱膜', lxL, HH*0.5, D*0.9, 0, HH*0.7, D-LT, '#b0b0b0'));
LGs.push(lblWithLine('腹内斜肌腱膜(前层)', lxL, HH*0.25, D*0.9, 0, HH*0.5, D-LT*1.5, '#d4a373'));
LGs.push(lblWithLine('腹直肌', lxL, HH*0.05, D*0.9, 0, HH*0.15, 0, '#e8845a'));
LGs.push(lblWithLine('腹内斜肌腱膜(后层)', lxL, -HH*0.15, D*0.9, 0, HH*0.35, -D+LT*2.5, '#d4a373'));
LGs.push(lblWithLine('腹横肌腱膜', lxL, -HH*0.35, D*0.9, 0, HH*0.2, -D+LT*1.5, '#7a7a7a'));

// --- Right side labels (below arcuate) ---
LGs.push(lblWithLine('腹外斜肌腱膜', lxR, -HH*0.3, D*0.9, 0, -HH*0.5, D-LT, '#b0b0b0'));
LGs.push(lblWithLine('腹内斜肌腱膜(前后层)', lxR, -HH*0.55, D*0.9, 0, -HH*0.7, D-LT*2, '#d4a373','12px'));
LGs.push(lblWithLine('腹横肌腱膜', lxR, -HH*0.8, D*0.9, 0, -HH*0.85, D-LT*3.5, '#7a7a7a'));
LGs.push(lblWithLine('腹直肌', lxR, -HH*0.2, D*0.9, 0, -HH*0.2, 0, '#e8845a'));
LGs.push(lblWithLine('(鞘后层缺如)', lxR, -HH*1.0, D*0.5, 0, -HH, -D*0.3, '#666', '11px'));

// ─── Slice Plane ───
const sp=new THREE.Mesh(
  new THREE.PlaneGeometry(HW*2+0.3,D*2+0.3),
  new THREE.MeshPhysicalMaterial({color:0x4a9eff,transparent:true,opacity:0.04,side:THREE.DoubleSide,emissive:0x4a9eff,emissiveIntensity:0.03})
);
sp.rotation.x=-Math.PI/2;sp.position.set(0,0,0);sp.visible=false;mg.add(sp);
const sb=new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-HW-0.05,0,-D-0.05),new THREE.Vector3(-HW-0.05,0,D+0.05),
    new THREE.Vector3(HW+0.05,0,D+0.05),new THREE.Vector3(HW+0.05,0,-D-0.05),
    new THREE.Vector3(-HW-0.05,0,-D-0.05)]),
  new THREE.LineBasicMaterial({color:0x4a9eff,transparent:true,opacity:0.3})
);
sb.visible=false;mg.add(sb);

// ─── Commands ───
const se=document.getElementById('st'),sh=document.getElementById('sh');
function upd(t,h=''){se.textContent=t;sh.textContent=h||'点击按钮或输入指令'}
let anim=false;

window.rst=()=>{
  cam.position.set(10,4,11);or.target.set(0,0,0);or.update();
  sp.visible=sb.visible=false;
  upd('腹直肌鞘 · 弓状线 · 一体模型');
};
window.tl=()=>{
  const v=!LGs[0].visible;LGs.forEach(l=>l.visible=v);
  upd(v?'标注开':'标注关');
};
window.as=()=>{
  if(anim)return;anim=true;sp.visible=sb.visible=true;
  const ss=-HH*1.1,es=HH*1.1,dur=3000,t0=performance.now();
  function step(t){
    const p=Math.min((t-t0)/dur,1),ee=p<0.5?2*p*p:-1+(4-2*p)*p,y=ss+(es-ss)*ee;
    sp.position.y=y;sb.position.y=y;
    if(p<1)requestAnimationFrame(step);else{anim=false;setTimeout(()=>{
      sp.position.y=0;sb.position.y=0;
      if(!sp.visible){sp.visible=false;sb.visible=false}
    },1500)}
  }
  requestAnimationFrame(step);upd('🔄 滑动截面：从上(弓上线以上)滑向下(弓线以下)...');
};
window.hc=async function(t){if(!t||!t.trim())return;
  document.getElementById('ti').value='';const l=t.toLowerCase().trim();
  const m=[
    {p:['复位','重置','还原'],f:()=>{rst();return'已复位'}},
    {p:['滑动','动画','过渡'],f:()=>{as();return'滑动截面'}},
    {p:['前层','鞘前层'],f:()=>{upd('🔍 鞘前层：弓上线以上=外斜+内斜前层 | 弓线以下=外斜+内斜(前后层)+腹横肌');return'鞘前层'}},
    {p:['后层','鞘后层'],f:()=>{upd('🔍 鞘后层：弓上线以上=内斜后层+腹横肌(有鞘后层) | 弓线以下=鞘后层缺如');return'鞘后层'}},
    {p:['讲解','教','学'],f:()=>{upd('📖 弓状线以上：腹内斜肌腱膜分裂为前后两层包裹腹直肌。弓状线以下：内斜腱膜不再分裂，三层腱膜全部走行于腹直肌前方。弓状线可理解为腹横肌腱膜上的"裂口"，腹直肌从此穿过。');return'讲解'}},
    {p:['临床','疝','薄弱'],f:()=>{upd('🏥 弓状线以下腹直肌鞘后层缺如，腹壁薄弱。下腹部手术(阑尾、剖宫产)后易发切口疝。');return'临床意义'}},
  ];
  for(const e of m)for(const p of e.p)if(l.includes(p)){upd('✅ '+e.f());return}
  upd('🤔 请试试: 滑动截面/前层/后层/讲解/临床');
};
document.getElementById('ti').addEventListener('keydown',e=>{if(e.key==='Enter')hc(e.target.value)});
window.addEventListener('resize',()=>{const w=ct.clientWidth,h=ct.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();r.setSize(w,h);lr.setSize(w,h)});
function loop(){requestAnimationFrame(loop);or.update();r.render(sc,cam);lr.render(sc,cam)}loop();
upd('腹直肌鞘 · 弓状线 | 上段:完整鞘 | 下段:鞘后层缺如');
</script>
</body>
</html>
