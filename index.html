<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>腹直肌鞘 - 弓状线上下层次对比</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;overflow:hidden;color:#eee}
  #c{width:100vw;height:100vh;display:block}

  #panel{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:5px;align-items:center;
    background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
    padding:8px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);
    max-width:96vw;z-index:100;
  }
  #cmd-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
  #cmd-row button{
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);
    color:#eee;padding:7px 10px;border-radius:9px;cursor:pointer;
    font-size:12px;white-space:nowrap;touch-action:manipulation;min-height:36px;
    -webkit-tap-highlight-color:transparent;
  }
  #cmd-row button:active{background:rgba(255,255,255,0.18);transform:scale(0.95)}
  #cmd-row button.p{background:#2d6a4f;border-color:#40916c}
  #inp-row{display:flex;gap:5px;width:100%}
  #inp-row input{
    flex:1;padding:8px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.4);color:#eee;font-size:16px;outline:none
  }
  #inp-row input:focus{border-color:#4a9eff}
  #inp-row button{
    padding:8px 14px;border-radius:9px;border:none;background:#4a9eff;color:#fff;font-size:13px;
    touch-action:manipulation;min-height:36px
  }

  #s{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
    padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);
    font-size:12px;z-index:100;text-align:center;max-width:90vw;line-height:1.4;pointer-events:none
  }
  #s .h{color:#888;font-size:11px;margin-top:2px;display:block}
  #lg{
    position:fixed;left:8px;top:60px;z-index:100;
    background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
    padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);font-size:11px;line-height:1.6;
    min-width:130px;display:none
  }
  #lg.show{display:block}
  #lg .i{display:flex;align-items:center;gap:6px;margin:2px 0}
  #lg .c{width:16px;height:12px;border-radius:2px;flex-shrink:0}
  #lt{position:fixed;left:8px;top:60px;z-index:100;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.06);color:#eee;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px}
  @media(max-width:768px){
    #panel{padding:6px 8px;gap:3px}
    #cmd-row button{font-size:11px;padding:5px 8px;min-height:32px}
    #s{font-size:11px;top:6px;padding:4px 12px}
    #lg{left:4px;top:50px;padding:6px;font-size:10px}
  }
</style>
</head>
<body>

<div id="s"><span id="st">⬅ 弓状线以上 → 腹直肌被鞘包裹 &nbsp;|&nbsp; 弓状线以下 → 三层腱膜全在前方</span><span class="h" id="sh">拖动旋转 / 滚轮缩放 / 按钮操作</span></div>
<button id="lt" onclick="document.getElementById('lg').classList.toggle('show')">📖</button>
<div id="lg">
  <div class="i"><span class="c" style="background:#d35400"></span> 腹外斜肌腱膜</div>
  <div class="i"><span class="c" style="background:#f39c12"></span> 腹内斜肌腱膜</div>
  <div class="i"><span class="c" style="background:#2d3e50"></span> 腹内斜肌腱膜(后层)</div>
  <div class="i"><span class="c" style="background:#7f8c8d"></span> 腹横肌腱膜</div>
  <div class="i"><span class="c" style="background:#c0392b"></span> 腹直肌</div>
  <div class="i"><span class="c" style="background:rgba(200,190,180,0.6)"></span> 腹横筋膜</div>
  <div class="i"><span class="c" style="background:#e74c3c;border-color:#ff6b6b"></span> 弓状线</div>
</div>

<div id="panel">
  <div id="cmd-row">
    <button onclick="showAll()">🔍完整</button>
    <button onclick="animateSlice()" class="p">▶滑动截面</button>
    <button onclick="toggleAbove()">⬆弓上线</button>
    <button onclick="toggleBelow()">⬇弓下线</button>
    <button onclick="toggleCrossSection()">✂截面</button>
    <button onclick="toggleLabels()">🏷标注</button>
    <button onclick="resetView()">🔄复位</button>
  </div>
  <div id="inp-row">
    <input id="ti" placeholder="输入: 滑动截面/弓上线/前层/后层/讲解/临床" />
    <button onclick="handleCmd(document.getElementById('ti').value)">发送</button>
  </div>
</div>

<div id="c"></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from 'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

const c=document.getElementById('c'),sc=new THREE.Scene();sc.background=new THREE.Color(0x0f0f1a);
const cam=new THREE.PerspectiveCamera(30,c.clientWidth/c.clientHeight,0.1,100);
cam.position.set(10,5,12);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(c.clientWidth,c.clientHeight);r.setPixelRatio(Math.min(window.devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.0;
c.appendChild(r.domElement);
const lr=new CSS2DRenderer();lr.setSize(c.clientWidth,c.clientHeight);
lr.domElement.style.position='absolute';lr.domElement.style.top='0';lr.domElement.style.left='0';
lr.domElement.style.pointerEvents='none';c.appendChild(lr.domElement);
const ct=new OrbitControls(cam,r.domElement);
ct.target.set(0,1.8,0);ct.enableDamping=true;ct.dampingFactor=0.08;ct.minDistance=4;ct.maxDistance=25;ct.update();

const al=new THREE.AmbientLight(0x404060,0.5);sc.add(al);
const kl=new THREE.DirectionalLight(0xffffff,2.5);kl.position.set(8,12,6);kl.castShadow=true;sc.add(kl);
const fl=new THREE.DirectionalLight(0x88bbff,0.6);fl.position.set(-5,4,-6);sc.add(fl);
const rl=new THREE.DirectionalLight(0xffffff,0.5);rl.position.set(-4,2,8);sc.add(rl);
sc.add(new THREE.HemisphereLight(0x4466aa,0x222244,0.4));
const gh=new THREE.GridHelper(14,14,0x33334d,0x22223a);gh.position.y=-0.5;sc.add(gh);

const mg=new THREE.Group();sc.add(mg);
const BH=3, BW=2.2, BD=1.8, LT=0.2;
const col={eo:0xd35400,io:0xf39c12,io_post:0x2d3e50,ta:0x7f8c8d,ra:0xc0392b,fascia:0x95a5a6,peri:0x8e7c6a};
// Above arcuate
const ag=new THREE.Group();ag.position.set(-BW-0.5,0,0);mg.add(ag);
function box(clr,w,h,d,x,y,z,op=1){const g=new THREE.BoxGeometry(w,h,d);const m=new THREE.MeshPhysicalMaterial({color:clr,roughness:0.6,metalness:0.0,transparent:op<1,opacity:op,clearcoat:0.05});const mesh=new THREE.Mesh(g,m);mesh.position.set(x,y,z);mesh.castShadow=true;return mesh}

// ABOVE: EO aponeurosis → IO ant leaf → RECTUS → IO post leaf → TA aponeurosis → fascia → peritoneum
ag.add(box(col.eo,BW,BH,LT,0,BH/2,BD-LT/2));
ag.add(box(col.io,BW,BH,LT,0,BH/2,BD-LT*1.5-0.02));
// Rectus
const ra=box(col.ra,1.1,BH,BD*2,0,BH/2,0);ag.add(ra);
// Posterior sheath
ag.add(box(col.io_post,BW,BH,LT,0,BH/2,-BD+LT*2.5+0.04));
ag.add(box(col.ta,BW,BH,LT,0,BH/2,-BD+LT*1.5+0.02));
// Fascia & peritoneum
ag.add(box(col.fascia,BW,BH,LT*0.3,0,BH/2,-BD+LT*0.3,0.4));
ag.add(box(col.peri,BW,BH,LT*0.15,0,BH/2,-BD-LT*0.2,0.15));

// BELOW: EO aponeurosis → IO aponeurosis → TA aponeurosis → RECTUS → (nothing) → fascia → peritoneum
const bg=new THREE.Group();bg.position.set(BW+0.5,0,0);mg.add(bg);
bg.add(box(col.eo,BW,BH,LT,0,BH/2,BD-LT/2));
bg.add(box(col.io,BW,BH,LT,0,BH/2,BD-LT*1.5-0.02));
bg.add(box(col.ta,BW,BH,LT,0,BH/2,BD-LT*2.5-0.04));
// Rectus - BEHIND all three aponeuroses
const rb=box(col.ra,1.1,BH,BD*1.5,0,BH/2,0);bg.add(rb);
// No posterior sheath! Just fascia & peritoneum
bg.add(box(col.fascia,BW,BH,LT*0.3,0,BH/2,-BD+LT*0.15,0.4));
bg.add(box(col.peri,BW,BH,LT*0.15,0,BH/2,-BD-LT*0.1,0.15));

// Arcuate line (red edge)
const alPts=[new THREE.Vector3(-0.05,-BH/2-0.05,-BD-0.05),new THREE.Vector3(-0.05,BH/2+0.05,-BD-0.05),new THREE.Vector3(-0.05,BH/2+0.05,BD+0.05),new THREE.Vector3(-0.05,-BH/2-0.05,BD+0.05)];
mg.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(alPts),new THREE.LineBasicMaterial({color:0xe74c3c})));

// Connection arrow
const alArrow=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.25,8),new THREE.MeshBasicMaterial({color:0xe74c3c}));
alArrow.position.set(0,BH+0.55,0);alArrow.rotation.x=Math.PI/2;mg.add(alArrow);
const alShaft=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.35,4),new THREE.MeshBasicMaterial({color:0xe74c3c}));
alShaft.position.set(0,BH+0.35,0);mg.add(alShaft);

// ─── Labels ───
function lbl(t,x,y,z,c='#fff',s='12px',bg=null){
  const d=document.createElement('div');d.textContent=t;
  d.style.color=c;d.style.fontSize=s;d.style.fontWeight='600';
  d.style.textShadow='0 2px 6px rgba(0,0,0,0.9)';
  d.style.background=bg||'rgba(0,0,0,0.55)';d.style.padding='3px 10px';
  d.style.borderRadius='6px';d.style.border='1px solid '+c;
  d.style.whiteSpace='nowrap';d.style.pointerEvents='none';
  const l=new CSS2DObject(d);l.position.set(x,y,z);mg.add(l);return l;
}
const labels=[
  lbl('弓状线以上',-BW-0.5,BH+0.2,BD+1.0,'#e74c3c'),
  lbl('弓状线以下',BW+0.5,BH+0.2,BD+1.0,'#e74c3c'),
  lbl('腹外斜肌腱膜 →',-BW-0.5,BH*0.8,BD+0.6,'#d35400','11px'),
  lbl('腹内斜肌腱膜前层 →',-BW-0.5,BH*0.6,BD+0.6,'#f39c12','11px'),
  lbl('← 腹内斜肌腱膜后层',-BW-0.5,BH*0.35,BD+0.6,'#2d3e50','11px'),
  lbl('← 腹横肌腱膜',-BW-0.5,BH*0.15,BD+0.6,'#7f8c8d','11px'),
  lbl('鞘前层(外斜+内斜前层)',-BW-0.5,BH+0.05,BD+0.6,'#e67e22','11px'),
  lbl('鞘后层(内斜后层+腹横肌)',-BW-0.5,BH-0.2,BD+0.6,'#566573','11px'),
  lbl('三层腱膜全在前方→',BW+0.5,BH*0.75,BD+0.6,'#e67e22','11px'),
  lbl('鞘后层缺如',BW+0.5,BH*0.25,BD+0.6,'#666','11px'),
  lbl('腹外斜肌腱膜→',BW+2.2,BH*0.82,BD+0.4,'#d35400','10px'),
  lbl('腹内斜肌腱膜→',BW+2.2,BH*0.62,BD+0.4,'#f39c12','10px'),
  lbl('腹横肌腱膜→',BW+2.2,BH*0.42,BD+0.4,'#7f8c8d','10px'),
  lbl('腹横筋膜/腹膜',BW+2.2,BH*0.1,BD+0.4,'#95a5a6','10px'),
  lbl('腹直肌',-BW-0.5,BH-0.55,BD+0.6,'#c0392b','12px'),
];
const alLbl=lbl('⬅ 弓状线 ➔',0,BH+0.7,0,'#e74c3c','14px','rgba(0,0,0,0.7)');

// ─── Slice Plane ───
const sp=new THREE.Mesh(new THREE.PlaneGeometry(BD*2+1,BH+1),new THREE.MeshPhysicalMaterial({color:0x4a9eff,transparent:true,opacity:0.06,side:THREE.DoubleSide,emissive:0x4a9eff,emissiveIntensity:0.05}));
sp.rotation.y=Math.PI/2;sp.position.set(0,BH/2,0);sp.visible=false;mg.add(sp);
const sb=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-0.01,-BH/2-0.05,-BD-0.1),new THREE.Vector3(-0.01,-BH/2-0.05,BD+0.1),new THREE.Vector3(-0.01,BH/2+0.05,BD+0.1),new THREE.Vector3(-0.01,BH/2+0.05,-BD-0.1),new THREE.Vector3(-0.01,-BH/2-0.05,-BD-0.1)]),new THREE.LineBasicMaterial({color:0x4a9eff,transparent:true,opacity:0.4}));
sb.visible=false;mg.add(sb);

// ─── State ───
const st={sa:true,sb:true,sc:false,sl:true,an:false};
window.showAll=()=>{st.sa=st.sb=true;ag.visible=bg.visible=true;sp.visible=sb.visible=false;update('完整展示弓状线上下对比')};
window.resetView=()=>{cam.position.set(10,5,12);ct.target.set(0,1.8,0);ct.update();showAll()};
window.toggleAbove=()=>{st.sa=!st.sa;ag.visible=st.sa;update(st.sa?'显示弓状线以上':'隐藏弓状线以上')};
window.toggleBelow=()=>{st.sb=!st.sb;bg.visible=st.sb;update(st.sb?'显示弓状线以下':'隐藏弓状线以下')};
window.toggleCrossSection=()=>{st.sc=!st.sc;sp.visible=sb.visible=st.sc;update(st.sc?'显示截面':'隐藏截面')};
window.toggleLabels=()=>{st.sl=!st.sl;labels.forEach(l=>l.visible=st.sl);alLbl.visible=st.sl;update(st.sl?'显示标注':'隐藏标注')};
window.animateSlice=()=>{
  if(st.an)return;st.an=true;sp.visible=sb.visible=true;
  const s=-BW-0.5-BW/2,e=BW+0.5+BW/2,d=3500,t0=performance.now();
  function step(t){const p=Math.min((t-t0)/d,1),e=p<0.5?2*p*p:-1+(4-2*p)*p,x=s+(e-s)*e;sp.position.x=x;sb.position.x=x;if(p<1)requestAnimationFrame(step);else{st.an=false;setTimeout(()=>{sp.position.x=0;sb.position.x=0;if(!st.sc){sp.visible=false;sb.visible=false}},2000)}}
  requestAnimationFrame(step);update('🔄 截面从左向右滑动，展示弓状线过渡...');
};

// ─── Commands ───
const se=document.getElementById('st'),sh=document.getElementById('sh');
function update(t,h=''){se.textContent=t;sh.textContent=h||'点击按钮或输入指令'}
const cmdMap=[
  {p:['完整','全部','show'],fn:()=>{showAll();return'完整展示'}},
  {p:['复位','重置','还原'],fn:()=>{resetView();return'已复位'}},
  {p:['弓状线以上','弓上线'],fn:()=>{toggleAbove();return'切换弓上线'}},
  {p:['弓状线以下','弓下线'],fn:()=>{toggleBelow();return'切换弓下线'}},
  {p:['截面','切面'],fn:()=>{toggleCrossSection();return'切换截面'}},
  {p:['标注','标签'],fn:()=>{toggleLabels();return'切换标注'}},
  {p:['滑动','动画','过渡'],fn:()=>{animateSlice();return'滑动截面过渡'}},
  {p:['前层','鞘前层'],fn:()=>{update('🔍 弓上线以上: 外斜+内斜前层 | 弓上线以下: 外斜+内斜+腹横肌全部在前');return'鞘前层构成'}},
  {p:['后层','鞘后层'],fn:()=>{update('🔍 弓上线以上: 内斜后层+腹横肌(有后层) | 弓上线以下: 鞘后层缺如，腹直肌直接贴腹横筋膜');return'鞘后层构成'}},
  {p:['讲解','教'],fn:()=>{update('📖 弓状线以上的关键：腹内斜肌腱膜分裂为前后两层，分别参与构成鞘前层和鞘后层。弓状线以下：外斜+内斜+腹横肌三层腱膜全部走行于腹直肌前方，后方无鞘。');return'讲解'}},
  {p:['临床','疝','薄弱'],fn:()=>{update('🏥 弓状线以下腹直肌鞘后层缺如，该区是腹壁薄弱处。下腹部手术(阑尾/剖宫产)后切口疝好发于此。');return'临床意义'}},
];
window.handleCmd=async function(t){if(!t||!t.trim())return;
  document.getElementById('ti').value='';const l=t.toLowerCase().trim();
  for(const e of cmdMap)for(const p of e.p)if(l.includes(p)){update('✅ '+e.fn());return}
  update('🤔 未理解"'+t+'"\n试试: 滑动截面/弓上线/前层/后层/讲解/临床');
};
document.getElementById('ti').addEventListener('keydown',e=>{if(e.key==='Enter')handleCmd(e.target.value)});

// ─── Resize ───
window.addEventListener('resize',()=>{const w=c.clientWidth,h=c.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();r.setSize(w,h);lr.setSize(w,h)});
// ─── Loop ───
function loop(){requestAnimationFrame(loop);ct.update();r.render(sc,cam);lr.render(sc,cam)}loop();
update('⬅ 弓状线以上: 腹直肌有前后鞘 | 弓状线以下: 三层腱膜全在前, 鞘后层缺如');
</script>
</body>
</html>
